<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Obsidian Analytics | Admin Sign In</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

    <!-- Manrope & JetBrains Mono Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet"/>

    <!-- Material Symbols Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        surface: '#131315',
                        'surface-container-low':  '#1b1b1d',
                        'surface-container':      '#201f21',
                        'surface-container-high': '#2a2a2c',
                        primary:   '#b76dff',
                        secondary: '#4edea3',
                        tertiary:  '#ea6767',
                        error:     '#ea6767',
                        'on-surface':         '#e5e1e4',
                        'on-surface-variant': '#a5a1a4',
                        'on-primary':         '#ffffff',
                    },
                    fontFamily: {
                        sans: ['Manrope', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                }
            }
        };
    </script>

    <style>
        /* Reuse same design tokens as main panel */
        body {
            background-color: #131315;
            color: #e5e1e4;
            -webkit-font-smoothing: antialiased;
            font-family: 'Manrope', sans-serif;
        }

        .glass-card {
            background: linear-gradient(135deg, rgba(26, 26, 30, 0.95) 0%, rgba(20, 20, 23, 0.98) 100%);
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
        }

        .gradient-button {
            background: linear-gradient(135deg, #b76dff 0%, #4edea3 100%);
            box-shadow: 0 4px 24px rgba(183, 109, 255, 0.4);
            transition: all 0.2s ease;
        }

        .gradient-button:hover {
            box-shadow: 0 6px 36px rgba(183, 109, 255, 0.55);
            transform: translateY(-1px);
        }

        .gradient-button:active {
            transform: scale(0.98) translateY(0);
        }

        .input-glass {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #e5e1e4;
            transition: all 0.2s ease;
        }

        .input-glass:focus {
            border-color: #b76dff;
            outline: none;
            box-shadow: 0 0 0 3px rgba(183, 109, 255, 0.12);
        }

        .input-glass.error {
            border-color: rgba(234, 103, 103, 0.6);
            box-shadow: 0 0 0 3px rgba(234, 103, 103, 0.1);
        }

        .input-glass::placeholder {
            color: rgba(165, 161, 164, 0.5);
        }

        /* Gradient logo hexagon */
        .logo-hex {
            background: linear-gradient(135deg, #b76dff 0%, #4edea3 100%);
            clip-path: polygon(50% 0%, 93% 25%, 93% 75%, 50% 100%, 7% 75%, 7% 25%);
        }

        /* Ambient background orbs */
        .orb-1 {
            position: fixed;
            top: -15%;
            right: -10%;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(183, 109, 255, 0.06) 0%, transparent 70%);
            pointer-events: none;
        }

        .orb-2 {
            position: fixed;
            bottom: -20%;
            left: -10%;
            width: 700px;
            height: 700px;
            background: radial-gradient(circle, rgba(78, 222, 163, 0.05) 0%, transparent 70%);
            pointer-events: none;
        }

        /* Progress bar */
        .progress-fill {
            background: linear-gradient(90deg, #b76dff 0%, #4edea3 100%);
            height: 100%;
            border-radius: 4px;
            transition: width 0.08s linear;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%       { transform: translateX(-8px); }
            40%       { transform: translateX(8px); }
            60%       { transform: translateX(-5px); }
            80%       { transform: translateX(5px); }
        }

        .shake { animation: shake 0.4s ease; }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .fade-in-up {
            animation: fadeInUp 0.5s ease-out forwards;
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #131315; }
        ::-webkit-scrollbar-thumb { background: #353437; border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 relative overflow-hidden">

    <!-- Ambient Background Orbs -->
    <div class="orb-1"></div>
    <div class="orb-2"></div>

    <!-- Subtle grid texture overlay -->
    <div class="fixed inset-0 pointer-events-none opacity-[0.015]"
         style="background-image: linear-gradient(rgba(255,255,255,0.3) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.3) 1px, transparent 1px); background-size: 40px 40px;">
    </div>

    <!-- Login Card -->
    <div id="login-card" class="glass-card rounded-3xl p-8 w-full max-w-[420px] relative z-10 fade-in-up">

        <!-- Brand Logo -->
        <div class="flex flex-col items-center mb-8">
            <div class="logo-hex w-16 h-16 flex items-center justify-center mb-4">
                <span class="material-symbols-outlined text-white text-2xl" style="font-variation-settings:'FILL' 1">analytics</span>
            </div>
            <div class="text-center">
                <h1 class="text-2xl font-extrabold text-on-surface tracking-tight">Welcome back, Admin</h1>
                <p class="text-on-surface-variant text-sm mt-1">Sign in to your control panel</p>
            </div>
        </div>

        <!-- Toast error area -->
        <div id="login-error-toast" class="hidden mb-4 px-4 py-3 rounded-xl bg-error/10 border border-error/20 flex items-center gap-3">
            <span class="material-symbols-outlined text-error text-lg" style="font-variation-settings:'FILL' 1">error</span>
            <p id="login-error-msg" class="text-sm text-error font-semibold"></p>
        </div>

        <!-- Login Form -->
        <form id="login-form" novalidate onsubmit="return false;">

            <!-- Email Field -->
            <div class="mb-4">
                <label class="block text-xs font-semibold text-on-surface-variant mb-2 uppercase tracking-wider" for="login-email">
                    Email Address
                </label>
                <div class="relative">
                    <span class="material-symbols-outlined absolute left-3.5 top-1/2 -translate-y-1/2 text-on-surface-variant text-lg pointer-events-none">mail</span>
                    <input
                        id="login-email"
                        type="email"
                        placeholder="admin@obsidian.io"
                        class="input-glass w-full pl-10 pr-4 py-3 rounded-xl text-sm font-medium"
                        autocomplete="email"
                        oninput="clearLoginFieldError('login-email')"
                        onkeydown="if(event.key==='Enter') attemptLogin()"
                    />
                </div>
                <p id="login-email-error" class="hidden text-xs text-error mt-1.5 flex items-center gap-1">
                    <span class="material-symbols-outlined text-sm">error</span>
                    <span id="login-email-error-msg"></span>
                </p>
            </div>

            <!-- Password Field -->
            <div class="mb-5">
                <label class="block text-xs font-semibold text-on-surface-variant mb-2 uppercase tracking-wider" for="login-password">
                    Password
                </label>
                <div class="relative">
                    <span class="material-symbols-outlined absolute left-3.5 top-1/2 -translate-y-1/2 text-on-surface-variant text-lg pointer-events-none">lock</span>
                    <input
                        id="login-password"
                        type="password"
                        placeholder="Enter your password"
                        class="input-glass w-full pl-10 pr-12 py-3 rounded-xl text-sm font-medium"
                        autocomplete="current-password"
                        oninput="clearLoginFieldError('login-password')"
                        onkeydown="if(event.key==='Enter') attemptLogin()"
                    />
                    <button
                        type="button"
                        class="absolute right-3.5 top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-on-surface transition-colors p-0.5"
                        onclick="togglePasswordVisibility()"
                        aria-label="Toggle password visibility"
                        id="pw-toggle-btn"
                    >
                        <span class="material-symbols-outlined text-lg" id="pw-toggle-icon">visibility</span>
                    </button>
                </div>
                <p id="login-password-error" class="hidden text-xs text-error mt-1.5 flex items-center gap-1">
                    <span class="material-symbols-outlined text-sm">error</span>
                    <span id="login-password-error-msg"></span>
                </p>
            </div>

            <!-- Remember Device -->
            <div class="flex items-center gap-3 mb-6">
                <input
                    id="remember-device"
                    type="checkbox"
                    class="w-4 h-4 rounded accent-primary cursor-pointer"
                />
                <label class="text-sm text-on-surface-variant cursor-pointer select-none" for="remember-device">
                    Remember this device
                </label>
            </div>

            <!-- Sign In Button -->
            <button
                id="signin-btn"
                type="button"
                onclick="attemptLogin()"
                class="gradient-button w-full py-3.5 rounded-xl text-white font-bold text-base flex items-center justify-center gap-2 relative overflow-hidden"
            >
                <span id="signin-btn-icon" class="material-symbols-outlined text-xl" style="font-variation-settings:'FILL' 1">login</span>
                <span id="signin-btn-label">Sign In</span>
            </button>

        </form>

        <!-- Progress Bar (shown on success) -->
        <div id="progress-bar-wrap" class="hidden mt-4">
            <div class="h-1.5 bg-surface-container-high rounded-full overflow-hidden">
                <div id="progress-bar-fill" class="progress-fill" style="width: 0%"></div>
            </div>
            <p class="text-xs text-on-surface-variant text-center mt-2">Authenticating...</p>
        </div>

        <!-- Footer Links -->
        <div class="mt-6 text-center text-xs text-on-surface-variant space-x-3">
            <button
                class="hover:text-primary transition-colors"
                onclick="showForgotPasswordToast()"
            >Forgot password?</button>
            <span class="opacity-30">·</span>
            <span>Obsidian Analytics v2.4.2</span>
        </div>

    </div>

    <script>
        // ---------------------------------------------------------------------------
        // Auth constants (inline fallback if constants.js not loaded)
        // ---------------------------------------------------------------------------
        const _CREDS = { EMAIL: 'admin@obsidian.io', PASSWORD: 'admin123' };
        const _REDIRECT_MS = 1500;

        // ---------------------------------------------------------------------------
        // Login attempt handler
        // ---------------------------------------------------------------------------
        function attemptLogin() {
            const emailEl = document.getElementById('login-email');
            const passEl  = document.getElementById('login-password');
            if (!emailEl || !passEl) return;

            const email    = emailEl.value.trim();
            const password = passEl.value;
            let hasError   = false;

            // Validate email presence
            if (!email) {
                showLoginFieldError('login-email', 'This field is required');
                hasError = true;
            } else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                showLoginFieldError('login-email', 'Enter a valid email address');
                hasError = true;
            }

            // Validate password presence
            if (!password) {
                showLoginFieldError('login-password', 'This field is required');
                hasError = true;
            }

            if (hasError) return;

            // Check credentials
            if (email === _CREDS.EMAIL && password === _CREDS.PASSWORD) {
                onLoginSuccess();
            } else {
                onLoginFailure();
            }
        }

        // ---------------------------------------------------------------------------
        // Success flow: progress bar → redirect
        // ---------------------------------------------------------------------------
        function onLoginSuccess() {
            const btn     = document.getElementById('signin-btn');
            const label   = document.getElementById('signin-btn-label');
            const icon    = document.getElementById('signin-btn-icon');
            const barWrap = document.getElementById('progress-bar-wrap');
            const barFill = document.getElementById('progress-bar-fill');

            // Transition button to loading state
            btn.disabled = true;
            btn.style.opacity = '0.8';
            if (icon)  icon.innerText = 'autorenew';
            if (label) label.innerText = 'Signing in...';

            // Animate icon spin via inline style (no class dependency)
            if (icon) icon.style.animation = 'spin 1s linear infinite';

            // Show progress bar
            if (barWrap) barWrap.classList.remove('hidden');

            // Drive progress bar 0→100% over _REDIRECT_MS
            let progress   = 0;
            const tickMs   = Math.floor(_REDIRECT_MS / 100);
            const tickTimer = setInterval(() => {
                progress = Math.min(progress + 1, 100);
                if (barFill) barFill.style.width = `${progress}%`;
                if (progress >= 100) {
                    clearInterval(tickTimer);
                    window.location.href = 'index.html';
                }
            }, tickMs);
        }

        // ---------------------------------------------------------------------------
        // Failure flow: shake card + show toast error
        // ---------------------------------------------------------------------------
        function onLoginFailure() {
            const card      = document.getElementById('login-card');
            const toast     = document.getElementById('login-error-toast');
            const toastMsg  = document.getElementById('login-error-msg');

            // Shake animation
            if (card) {
                card.classList.remove('shake');
                void card.offsetWidth; // reflow to restart animation
                card.classList.add('shake');
                card.addEventListener('animationend', () => card.classList.remove('shake'), { once: true });
            }

            // Show inline toast error
            if (toast && toastMsg) {
                toastMsg.textContent = 'Invalid credentials. Please try again.';
                toast.classList.remove('hidden');
                toast.classList.add('flex');
            }

            // Clear password field for re-entry
            const passEl = document.getElementById('login-password');
            if (passEl) passEl.value = '';
        }

        // ---------------------------------------------------------------------------
        // Field-level validation helpers
        // ---------------------------------------------------------------------------
        function showLoginFieldError(fieldId, message) {
            const input   = document.getElementById(fieldId);
            const errorEl = document.getElementById(`${fieldId}-error`);
            const msgEl   = document.getElementById(`${fieldId}-error-msg`);

            if (input) input.classList.add('error');
            if (errorEl) {
                errorEl.classList.remove('hidden');
                errorEl.classList.add('flex');
            }
            if (msgEl) msgEl.textContent = message;
        }

        function clearLoginFieldError(fieldId) {
            const input   = document.getElementById(fieldId);
            const errorEl = document.getElementById(`${fieldId}-error`);
            const toast   = document.getElementById('login-error-toast');

            if (input) input.classList.remove('error');
            if (errorEl) {
                errorEl.classList.add('hidden');
                errorEl.classList.remove('flex');
            }
            // Hide the global error toast when user starts typing
            if (toast) {
                toast.classList.add('hidden');
                toast.classList.remove('flex');
            }
        }

        // ---------------------------------------------------------------------------
        // Password visibility toggle
        // ---------------------------------------------------------------------------
        function togglePasswordVisibility() {
            const passEl   = document.getElementById('login-password');
            const iconEl   = document.getElementById('pw-toggle-icon');
            if (!passEl || !iconEl) return;
            const isHidden = passEl.type === 'password';
            passEl.type    = isHidden ? 'text' : 'password';
            iconEl.innerText = isHidden ? 'visibility_off' : 'visibility';
        }

        // ---------------------------------------------------------------------------
        // Forgot password hint
        // ---------------------------------------------------------------------------
        function showForgotPasswordToast() {
            const toast    = document.getElementById('login-error-toast');
            const toastMsg = document.getElementById('login-error-msg');
            if (toast && toastMsg) {
                // Reuse error toast for info (different colour via class swap)
                toastMsg.textContent = 'Contact your Super Admin to reset your password.';
                toast.classList.remove('hidden', 'bg-error/10', 'border-error/20');
                toast.classList.add('flex', 'bg-primary/10', 'border-primary/20');
                const icon = toast.querySelector('.material-symbols-outlined');
                if (icon) {
                    icon.classList.remove('text-error');
                    icon.classList.add('text-primary');
                    icon.innerText = 'info';
                }
                setTimeout(() => {
                    toast.classList.add('hidden');
                    toast.classList.remove('flex', 'bg-primary/10', 'border-primary/20');
                    toast.classList.add('bg-error/10', 'border-error/20');
                    if (icon) {
                        icon.classList.remove('text-primary');
                        icon.classList.add('text-error');
                        icon.innerText = 'error';
                    }
                }, 4000);
            }
        }
    </script>
</body>
</html>
